<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css">
    <script defer src="quiz.js"></script>
</head>
<body>
    <main class="main-container">
        <article class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge and skills with these beginner to advanced questions.</p>
            <button type="submit" id="start-btn">Start Quiz</button>
        </article>
        <article class="screen" id="quiz-screen">
            <main class="quiz-header">
                <h2 id="question-text">question goes here?</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span>of <span id="total-questions">10</span></p>
                    <p>score: <span id="score">0</span></p>
                </div>
                <div id="answers-container" class="answers-container"></div>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
            </main>
        </article>
        <article id="result-screen" class="screen">
            <h1>Quiz results</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="max-score">10</span></p>
                <div id="result-message">Good Work!</div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </article>
    </main>
    <script  src="quiz.js"></script>
</body>
</html>
